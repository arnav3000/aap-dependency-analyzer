# Markdownlint configuration
# Enforce documentation quality and prevent bloat

# Default state for all rules
default: true

# Line length - enforce reasonable documentation length
MD013: false  # Disabled for README.md which has setup instructions

# Multiple headers with the same content
MD024:
  # Allow duplicate headers if they're not siblings
  siblings_only: true

# Inline HTML
MD033:
  # Allow certain HTML elements that are useful in docs
  allowed_elements:
  - br
  - details
  - summary
  - img
  - a

# Bare URLs
MD034: false  # Allow bare URLs (common in docs)

# First line in file
MD041:
  # First line should be a top-level header
  level: 1

# Code fence style
MD046:
  # Use fenced code blocks
  style: fenced

# File length limit - CRITICAL for preventing documentation bloat
# This is the key rule to prevent unlimited docs
MD025: true  # Single top-level header

# Emphasis as heading - Allow for step sections
MD036: false  # Allow emphasis for non-heading text (used in step instructions)

# Fenced code language - Allow blocks without language for output examples
MD040: false  # Allow code blocks without language specification

# Table column count - Allow flexible table structures
MD056: false  # Allow tables with varying column counts
